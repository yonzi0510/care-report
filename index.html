<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>특이사항 보고서</title>
<style>
  :root{
    --bg:#f4f2ec; --card:#ffffff; --ink:#2b2a27; --ink2:#6b6862; --ink3:#9b978f;
    --border:#e0ddd5; --accent:#4a6fa5; --danger:#E24B4A;
    --bg-danger:#fbeceb; --bg-info:#eaf1fa;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1140px;margin:0 auto;padding:20px 16px 60px;}
  #gate{min-height:80vh;display:flex;align-items:center;justify-content:center;}
  .gatecard{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:34px 30px;width:100%;max-width:340px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,.05);}
  .lock{font-size:30px;margin-bottom:8px;}
  .gatecard h1{font-size:17px;margin:0 0 4px;font-weight:700;}
  .gatecard p{font-size:12.5px;color:var(--ink2);margin:0 0 22px;}
  #code{width:100%;font-size:22px;letter-spacing:.32em;text-align:center;
    padding:12px 10px;border:1.4px solid var(--border);border-radius:10px;outline:none;
    font-family:inherit;background:#fcfbf9;}
  #code:focus{border-color:var(--accent);}
  button#enter{margin-top:14px;width:100%;padding:12px;font-size:15px;font-weight:600;
    color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;}
  button#enter:active{opacity:.85;}
  button#enter:disabled{opacity:.5;cursor:default;}
  #err{color:var(--danger);font-size:12.5px;margin-top:12px;min-height:16px;}
  #app{display:none;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .topbar h1{font-size:16px;margin:0;font-weight:700;}
  .spacer{flex:1;}
  select#picker{font-size:13px;padding:7px 10px;border:1px solid var(--border);
    border-radius:8px;background:#fff;font-family:inherit;color:var(--ink);}
  .btn-ghost{font-size:12px;padding:7px 11px;border:1px solid var(--border);
    border-radius:8px;background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;}
  .tabs{display:flex;gap:6px;margin:0 0 14px;}
  .tab{flex:1;font-size:14px;font-weight:600;padding:10px 8px;border:1px solid var(--border);
    border-radius:10px;background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;
    text-align:center;transition:all .12s;}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .tab:active{opacity:.85;}
  #report{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:6px 22px 22px;
    --color-text-primary:var(--ink);--color-text-secondary:var(--ink2);
    --color-text-tertiary:var(--ink3);--color-background-danger:var(--bg-danger);
    --color-background-info:var(--bg-info);
    --color-border-tertiary:var(--border);--color-background-primary:var(--card);}
  .muted{color:var(--ink3);font-size:12px;text-align:center;padding:30px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>
<div class="wrap">

  <div id="gate">
    <form class="gatecard" id="gateform">
      <div class="lock">🔒</div>
      <h1>삽교주간보호 특이사항 보고서</h1>
      <p>열람하려면 진입코드를 입력하세요</p>
      <input id="code" inputmode="text" autocomplete="off" autofocus placeholder="••••"/>
      <button id="enter" type="submit">열기</button>
      <div id="err"></div>
    </form>
  </div>

  <div id="app">
    <div class="topbar">
      <h1>특이사항 보고서</h1>
      <div class="spacer"></div>
      <select id="picker" aria-label="보고서 날짜 선택"></select>
      <button class="btn-ghost" id="lock">잠그기</button>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="day">일일</button>
      <button class="tab" data-tab="week">주간</button>
      <button class="tab" data-tab="month">월간</button>
    </div>
    <div id="report"><div class="muted">불러오는 중…</div></div>
  </div>

</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();
let PASS = null;
let manifest = [];
let curTab = 'day';

const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

async function deriveKey(passcode, saltBytes, iter){
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(passcode), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:saltBytes, iterations:iter, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function decryptPayload(payload, passcode){
  const salt = b64ToBytes(payload.salt), iv = b64ToBytes(payload.iv), ct = b64ToBytes(payload.ct);
  const key = await deriveKey(passcode, salt, payload.iter || 100000);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return dec.decode(plainBuf);
}
async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error('not found');
  return r.json();
}
function kindOf(key){
  if(/^M\d{6}$/.test(key)) return 'month';
  if(/^W\d{8}$/.test(key)) return 'week';
  return 'day';
}

document.getElementById('gateform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const code = document.getElementById('code').value.trim();
  const errEl = document.getElementById('err');
  const btn = document.getElementById('enter');
  errEl.textContent=''; btn.disabled=true; btn.textContent='확인 중…';
  try{
    manifest = (await fetchJSON('manifest.json')).reports || [];
    if(!manifest.length){ throw {nodata:true}; }
    const latest = await fetchJSON(manifest[0].key + '.json');
    await decryptPayload(latest, code);
    PASS = code;
    enterApp();
  }catch(ex){
    if(ex && ex.nodata){ errEl.textContent='아직 등록된 보고서가 없습니다.'; }
    else { errEl.textContent='진입코드가 올바르지 않습니다.'; }
    btn.disabled=false; btn.textContent='열기';
    document.getElementById('code').select();
  }
});

function enterApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('picker').addEventListener('change', loadSelected);
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=> selectTab(t.dataset.tab));
  });
  let startTab = 'day';
  if(!manifest.some(r=>kindOf(r.key)==='day')){
    startTab = manifest.some(r=>kindOf(r.key)==='week') ? 'week' : 'month';
  }
  selectTab(startTab);
}

function fillPicker(tab){
  const picker = document.getElementById('picker');
  const items = manifest.filter(r=>kindOf(r.key)===tab);
  picker.innerHTML = items.map(r=>`<option value="${r.key}">${r.date}</option>`).join('');
  return items;
}

function selectTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('active', t.dataset.tab===tab));
  const items = fillPicker(tab);
  const rep = document.getElementById('report');
  if(!items.length){
    document.getElementById('picker').innerHTML='';
    rep.innerHTML='<div class="muted">해당 종류의 보고서가 아직 없습니다.</div>';
    return;
  }
  document.getElementById('picker').value = items[0].key;
  loadSelected();
}

async function loadSelected(){
  const key = document.getElementById('picker').value;
  if(!key) return;
  const rep = document.getElementById('report');
  rep.innerHTML = '<div class="muted">불러오는 중…</div>';
  try{
    const payload = await fetchJSON(key + '.json');
    rep.innerHTML = await decryptPayload(payload, PASS);
  }catch(ex){ rep.innerHTML = '<div class="muted">보고서를 불러오지 못했습니다.</div>'; }
}

document.getElementById('lock').addEventListener('click', ()=>{ location.reload(); });
</script>
</body>
</html>
